name: Snack Upload

on:
    push:
        branches:
            - main

jobs:
    upload-snack:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js 18
              uses: actions/setup-node@v3
              with:
                  node-version: 18
                  cache: "yarn"

            - name: Install dependencies
              run: |
                  yarn
                  cd apps/native
                  yarn

            - name: Run snack-upload.js
              run: |
                  cd apps/native
                  NODE_ENV=production node scripts/snack-upload.js --accessToken=${{ secrets.EXPO_SNACK_ACCESS_TOKEN }}
              env:
                  EXPO_SNACK_ACCESS_TOKEN: ${{ secrets.EXPO_SNACK_ACCESS_TOKEN }}
